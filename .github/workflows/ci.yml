name: CI
on:
  push:
    branches: [feature/auth]
  pull_request:
    branches: [feature/auth]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 11

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install Ruff
        run: pip install ruff

      - name: Run Ruff check
        run: ruff check .

      - name: Build all services
        run: docker compose build

      - name: Start all services
        run: |
          cp .env.example .env
          docker compose -f docker-compose.yml --env-file .env up --build -d

      - name: Wait for services to be healthy
        run: |
          echo "Waiting for services to be healthy..."
          timeout 120 bash -c '
            until docker compose ps --format json | python3 -c "import sys,json; services=[json.loads(line) for line in sys.stdin if line.strip()]; unhealthy=[s.get(\"Name\",\"unknown\") for s in services if s.get(\"Health\") not in (\"healthy\", \"\")]; print(\"All services are healthy.\") if not unhealthy else (print(\"Waiting for:\", unhealthy), sys.exit(1))"; do
              sleep 5
            done
          '

      - name: Wait for API Gateway readiness
        run: |
          echo "Waiting for API Gateway endpoint..."
          timeout 120 bash -c '
            until [ "$(curl -sS -o /dev/null -w "%{http_code}" http://localhost:8000/ || true)" = "200" ]; do
              echo "Gateway not ready yet"
              sleep 3
            done
          '
      - name: Run integration tests
        run: |
          chmod +x ./scripts/tests.sh
          ./scripts/tests.sh

      - name: Show logs if tests fail
        if: failure()
        run: docker compose logs --tail=100

      - name: Cleanup
        if: always()
        run: docker compose down -v
