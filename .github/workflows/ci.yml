name: CI
on:
  push:
    branches: [feature/auth]
  pull_request:
    branches: [feature/auth]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 11

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build all services
        run: docker compose build

      - name: Start all services
        run: |
          cp .env.example .env
          docker compose -f docker-compose.yml --env-file .env up --build -d

      - name: Wait for services to be healthy
        run: |
          echo "Waiting for services to be healthy..."
          timeout 120 bash -c '
            until docker compose ps --format json | python3 -c "
            import sys, json
            services = [json.loads(line) for line in sys.stdin]
            unhealthy = [s[\"Name\"] for s in services if s.get(\"Health\") not in (\"healthy\", \"\")]
            if unhealthy:
                print(\"Waiting for:\", unhealthy)
                sys.exit(1)
            else:
                print(\"All services are healthy.\")
            "; do
              sleep 5
            done
          '
      - name: Run integration tests
        run: |
          chmod +x ./scripts/tests.sh
          ./scripts/tests.sh

      - name: Show logs if tests fail
        if: failure()
        run: docker compose logs --tail=100

      - name: Cleanup
        if: always()
        run: docker compose down -v
