services:
  rabbitmq:
    image: rabbitmq:3-management
    env_file: ${ENV_FILE:-.env.dev}
    restart: on-failure
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "check_port_connectivity"]
      interval: 5s
      timeout: 10s
      retries: 10
      start_period: 15s

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    env_file: ${ENV_FILE:-.env.dev}
    restart: on-failure
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    env_file: ${ENV_FILE:-.env.dev}
    restart: on-failure
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      retries: 5

  api-gateway:
    build: ./api-gateway
    env_file: ${ENV_FILE:-.env.dev}
    restart: on-failure
    depends_on:
      redis:
        condition: service_healthy
      writer-service:
        condition: service_started
      inventory-service:
        condition: service_started

  writer-service:
    build: ./writer-service
    env_file: ${ENV_FILE:-.env.dev}
    restart: on-failure
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  postgres-inventory:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${INVENTORY_POSTGRES_USER}
      POSTGRES_PASSWORD: ${INVENTORY_POSTGRES_PASSWORD}
      POSTGRES_DB: ${INVENTORY_POSTGRES_DB}
    env_file: ${ENV_FILE:-.env.dev}
    restart: on-failure
    volumes:
      - pg_inventory_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${INVENTORY_POSTGRES_USER} -d ${INVENTORY_POSTGRES_DB}"]
      interval: 5s
      retries: 5

  inventory-service:
    build: ./inventory-service
    env_file: ${ENV_FILE:-.env.dev}
    restart: on-failure
    depends_on:
      postgres-inventory:
        condition: service_healthy
      redis:
        condition: service_healthy

  postgres-notifications:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${NOTIFICATIONS_POSTGRES_USER}
      POSTGRES_PASSWORD: ${NOTIFICATIONS_POSTGRES_PASSWORD}
      POSTGRES_DB: ${NOTIFICATIONS_POSTGRES_DB}
    env_file: ${ENV_FILE:-.env.dev}
    restart: on-failure
    volumes:
      - pg_notifications_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${NOTIFICATIONS_POSTGRES_USER} -d ${NOTIFICATIONS_POSTGRES_DB}"]
      interval: 5s
      retries: 5

  notifications-service:
    build: ./notifications-service
    env_file: ${ENV_FILE:-.env.dev}
    restart: on-failure
    depends_on:
      postgres-notifications:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  frontend:
    build: ./Frontend
    env_file: ${ENV_FILE:-.env.dev}
    restart: on-failure
    depends_on:
      - api-gateway

volumes:
  pg_data:
  pg_inventory_data:
  pg_notifications_data:
