services:
  rabbitmq:
    image: rabbitmq:3-management
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "check_port_connectivity"]
      interval: 5s
      timeout: 10s
      retries: 10
      start_period: 15s

  postgres:
    image: postgres:16-alpine
    env_file: ${ENV_FILE:-.env.dev}
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      retries: 5

  api-gateway:
    build: ./api-gateway
    env_file: ${ENV_FILE:-.env.dev}
    ports:
      - "8000:8000"
    depends_on:
      redis:
        condition: service_healthy
      order-service:
        condition: service_started
      auth-service:
        condition: service_started

  auth-service:
    build: ./auth-service
    env_file: ${ENV_FILE:-.env.dev}
    ports:
      - "8003:7000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  order-service:
    build: ./writer-service
    env_file: ${ENV_FILE:-.env.dev}
    ports:
      - "8001:7001"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  inventory-service:
    build: ./inventory-service
    env_file: ${ENV_FILE:-.env.dev}
    ports:
      - "8002:8002"
    depends_on:
      rabbitmq:
        condition: service_healthy

  notification-service:
    build: ./notification-service
    env_file: ${ENV_FILE:-.env.dev}
    depends_on:
      rabbitmq:
        condition: service_healthy

  analytics-service:
    build: ./analytics-service
    env_file: ${ENV_FILE:-.env.dev}
    depends_on:
      rabbitmq:
        condition: service_healthy

  frontend:
    build: ./Frontend
    ports:
      - "3000:80"
    depends_on:
      - api-gateway

volumes:
  pg_data:
